<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIM Labor – 3D / AR (model-viewer)</title>
  <!-- model-viewer wird nur bei http(s) geladen, nicht bei file:// (sonst Konsolen-Fehler) -->
  <style>
    html, body { height: 100%; margin: 0; background: #1a1a1a; display: flex; flex-direction: column; }
    #viewer-root { flex: 1; min-height: 40vh; position: relative; }
    model-viewer { width: 100%; height: 100%; position: absolute; inset: 0; }
    .hint {
      padding: 10px 14px; font: 14px/1.4 system-ui, sans-serif;
      background: rgba(0,0,0,.75); color: #eee;
    }
    #status {
      padding: 14px 16px; font: 14px/1.5 system-ui, sans-serif;
      border-radius: 8px; margin: 12px;
    }
    #status.err { background: #3d1515; color: #fecaca; border: 1px solid #991b1b; }
    #status.ok { background: #14532d; color: #dcfce7; border: 1px solid #166534; }
    code { font-size: 0.95em; word-break: break-all; }
  </style>
</head>
<body>
  <div id="status" role="status"></div>
  <div id="viewer-root"></div>
  <div class="hint">
    <strong>Wichtig:</strong> Nicht per Doppelklick (<code>file://</code>) – GLB wird blockiert.<br />
    In <strong>diesem</strong> Ordner: <code>python -m http.server 8080</code> →
    <code>http://localhost:8080/VR_Viewer_Web.html</code>
  </div>

  <script type="module">
    const MODEL = "Projekt_BIM_AUF.glb";
    const root = document.getElementById("viewer-root");
    const status = document.getElementById("status");

    if (window.location.protocol === "file:") {
      status.className = "err";
      status.innerHTML =
        "<strong>file:// geht nicht</strong> – Browser blockieren das Laden von <code>.glb</code> (CORS).<br />" +
        "Öffne die Seite nur über einen lokalen Server, z.&nbsp;B.:<br />" +
        "<code>python -m http.server 8080</code> in diesem Ordner, dann<br />" +
        "<code>http://localhost:8080/VR_Viewer_Web.html</code>";
      root.style.background = "#2d2d2d";
    } else {
      await import("https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js");
      const mv = document.createElement("model-viewer");
      mv.setAttribute("src", "./" + MODEL);
      mv.setAttribute("alt", "Umbaumodell Laborgebäude");
      mv.setAttribute("camera-controls", "");
      mv.setAttribute("touch-action", "pan-y");
      mv.setAttribute("shadow-intensity", "1");
      mv.setAttribute("exposure", "1");
      mv.setAttribute("environment-image", "neutral");
      mv.setAttribute("ar", "");
      mv.setAttribute("ar-modes", "webxr scene-viewer quick-look");
      root.appendChild(mv);

      const modelUrl = new URL(MODEL, window.location.href).href;
      try {
        const r = await fetch(modelUrl, { method: "HEAD", cache: "no-store" });
        if (!r.ok) {
          status.className = "err";
          status.innerHTML = "Modell nicht gefunden (HTTP " + r.status + "). URL: <code>" + modelUrl + "</code>";
        } else {
          status.className = "ok";
          status.textContent = "Lade Modell …";
          setTimeout(() => { status.style.display = "none"; }, 2000);
        }
      } catch (e) {
        status.className = "err";
        status.textContent = String(e);
      }
      mv.addEventListener("error", () => {
        status.style.display = "block";
        status.className = "err";
        status.innerHTML = "Laden fehlgeschlagen: <code>" + modelUrl + "</code>";
      });
      mv.addEventListener("load", () => {
        status.style.display = "none";
      });
    }
  </script>
</body>
</html>
