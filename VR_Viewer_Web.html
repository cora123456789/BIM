<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIM Labor – 3D / AR (model-viewer)</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; background: #1a1a1a; }
    model-viewer { width: 100%; height: 100%; }
    .hint {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 14px; font: 14px/1.4 system-ui, sans-serif;
      background: rgba(0,0,0,.75); color: #eee;
    }
  </style>
</head>
<body>
  <!-- GLB liegt im gleichen Ordner wie diese HTML-Datei -->
  <model-viewer
    src="./Modell%20haus.glb"
    alt="Umbaumodell Laborgebäude"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    ar
    ar-modes="webxr scene-viewer quick-look"
    style="background-color: #2d2d2d;">
  </model-viewer>
  <div class="hint">
    PC: Maus drehen / zoomen. Mobil: AR-Button (wenn unterstützt).
    Lokal öffnen: Ordner per <code>python -m http.server</code> bereitstellen (siehe VR_ANLEITUNG.txt).
  </div>
</body>
</html>
